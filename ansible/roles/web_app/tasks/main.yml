---
# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  when: web_app_wipe | bool
  tags:
    - web_app_wipe

- name: Deploy application with Docker Compose
  block:
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: Template docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy application with Docker Compose v2
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always

  rescue:
    - name: Handle deployment failure
      ansible.builtin.debug:
        msg: "Deployment of {{ app_name }} failed"

  become: true
  tags:
    - app_deploy
    - compose