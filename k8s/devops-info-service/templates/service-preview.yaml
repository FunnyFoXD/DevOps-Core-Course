{{- if eq .Values.rollout.strategy "blueGreen" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info-service.fullname" . }}-preview
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: preview
spec:
  type: {{ .Values.service.previewType | default "ClusterIP" }}
  selector:
    {{- include "devops-info-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      {{- if eq (.Values.service.previewType | default "ClusterIP") "NodePort" }}
      nodePort: {{ required "service.previewNodePort is required when previewType is NodePort" .Values.service.previewNodePort }}
      {{- end }}
{{- end }}
