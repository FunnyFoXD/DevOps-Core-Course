replicaCount: 3

image:
  repository: funnyfoxd/devops-info-service
  tag: lab02
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  host: "0.0.0.0"
  port: "5000"

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

hooks:
  image: busybox:1.36
  preInstall:
    enabled: true
    weight: -5
    command: "echo Pre-install validation for devops-info-service && sleep 3 && echo Pre-install completed"
  postInstall:
    enabled: true
    weight: 5
    command: "echo Post-install smoke check for devops-info-service && sleep 3 && echo Post-install completed"
